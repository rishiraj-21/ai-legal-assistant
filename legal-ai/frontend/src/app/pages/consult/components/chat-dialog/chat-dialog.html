<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" (click)="closed.emit()">
  <div class="elevated-card w-full max-w-lg max-h-[80vh] flex flex-col overflow-hidden" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="bg-gradient-primary text-primary-foreground p-4 flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-primary-foreground/20 grid place-items-center font-display font-semibold text-sm">
        {{ lawyer().initials }}
      </div>
      <div class="flex-1">
        <p class="font-medium text-sm">{{ lawyer().name }}</p>
        <p class="text-xs text-primary-foreground/70">{{ lawyer().spec }} &middot; Online</p>
      </div>
      <button (click)="videoRequested.emit()"
              class="w-9 h-9 grid place-items-center rounded-lg hover:bg-primary-foreground/10"
              aria-label="Voice call">
        <lucide-icon [img]="PhoneIcon" class="w-4 h-4"></lucide-icon>
      </button>
      <button (click)="closed.emit()"
              class="w-9 h-9 grid place-items-center rounded-lg hover:bg-primary-foreground/10"
              aria-label="Close">
        <lucide-icon [img]="XIcon" class="w-4 h-4"></lucide-icon>
      </button>
    </div>

    <p class="text-center text-xs text-muted-foreground py-2 border-b border-border/60">
      End-to-end confidential &middot; &#8377;{{ lawyer().chat }}/min
    </p>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[200px]">
      @for (m of messages(); track $index) {
        <div class="flex" [class.justify-end]="m.from === 'me'">
          <div class="max-w-[80%] px-4 py-2.5 rounded-2xl text-sm"
               [class.bg-primary]="m.from === 'me'"
               [class.text-primary-foreground]="m.from === 'me'"
               [class.bg-secondary]="m.from === 'them'">
            {{ m.text }}
          </div>
        </div>
      }
    </div>

    <!-- Input -->
    <div class="p-3 border-t border-border/60 flex items-center gap-2">
      <input
        type="text"
        [ngModel]="draft()"
        (ngModelChange)="draft.set($event)"
        (keydown)="onKeyDown($event)"
        placeholder="Type your message\u2026"
        class="flex-1 h-10 rounded-xl bg-card border border-input px-3 text-sm focus:outline-none focus:ring-2 focus:ring-ring">
      <button (click)="send()"
              class="w-10 h-10 rounded-xl bg-gradient-primary grid place-items-center shadow-soft hover:opacity-95 transition-opacity">
        <lucide-icon [img]="SendIcon" class="w-4 h-4 text-primary-foreground"></lucide-icon>
      </button>
    </div>

    <p class="text-center text-xs text-muted-foreground py-2">
      All consultations are confidential and recorded per consent.
    </p>
  </div>
</div>
