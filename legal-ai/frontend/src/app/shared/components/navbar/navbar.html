<nav class="sticky top-0 z-50 glass-card">
  <div class="container flex items-center justify-between h-16">
    <a routerLink="/" class="flex items-center gap-2 font-display text-xl font-semibold text-primary">
      <lucide-icon [img]="ScaleIcon" class="w-5 h-5"></lucide-icon>
      Lex
      <span class="text-xs font-normal text-muted-foreground ml-1">AI Legal Assistant</span>
    </a>

    <div class="flex items-center gap-2">
      @if (isLanding) {
        <a routerLink="/consult"
           class="px-4 py-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors rounded-xl">
          Lawyers
        </a>
        <a routerLink="/signup"
           class="px-5 py-2 text-sm font-medium rounded-xl bg-gradient-primary text-primary-foreground shadow-soft hover:opacity-95 transition-opacity">
          Get Started
        </a>
      } @else {
        <a routerLink="/dashboard"
           class="px-4 py-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors rounded-xl">
          Analyze
        </a>
        <a routerLink="/consult"
           class="px-5 py-2 text-sm font-medium rounded-xl bg-gradient-primary text-primary-foreground shadow-soft hover:opacity-95 transition-opacity">
          Consult a Lawyer
        </a>
      }
    </div>
  </div>
</nav>
